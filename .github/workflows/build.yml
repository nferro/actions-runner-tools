name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    # Intentionally `ubuntu-latest`, not an ARC pool that may use this image.
    # An image builder must never depend on the image it produces — if a bad
    # push broke the runner pool, we'd be unable to build the fix.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # First publish creates the ghcr package as private. After the first
      # successful run, set visibility to public at
      # https://github.com/users/nferro/packages/container/actions-runner-tools/settings
      # so consumers can pull without an imagePullSecret.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nferro/actions-runner-tools:latest
            ghcr.io/nferro/actions-runner-tools:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
